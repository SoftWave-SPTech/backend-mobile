spring:
  datasource:
    url: jdbc:h2:mem:softwave_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-that-is-long-enough-for-hmac-sha256-algorithm-bits-required-here

app:
  security:
    internal-token: test-internal-token-for-ci
